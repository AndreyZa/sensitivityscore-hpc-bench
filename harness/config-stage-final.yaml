# config-stage-final.yaml — РЕГРЕССИОННЫЙ ПОВТОР проверочной серии.
#
# Зачем. За 18-20.07 изменилось многое из того, через что проходит каждый
# прогон: агент читает счётчики с enabled/running и масштабирует значения
# (A5), обвязка серии стала параметризованной по стенду (STAND), провенанс
# пишет новые колонки, конфиги стали слоями поверх родителя, статус-страница
# переехала в контейнер, ClickHouse льётся в два приёмника. Ни одно из этих
# изменений не должно было тронуть ИЗМЕРЕНИЯ — но «не должно было» проверяется
# прогоном, а не рассуждением.
#
# Дизайн намеренно не свой: конфиг наследует config-stage-mixed-calib.yaml
# целиком и переопределяет ТОЛЬКО имена выходных файлов. Значит поток задач,
# профили, штормы, веса и число повторений побайтово те же, что у серии,
# чьи числа стоят в презентации (78.8 / 81.5 / 85.2 с, ошибка размещения
# 0.019 / 0.197 / 0.546, 0 из 60 задач SS на дисковом узле). Расхождение
# результатов = регрессия в чём-то из перечисленного выше.
#
# Ожидание (объявлено ДО прогона):
#   1. Среднее время SS ≤ default, как и было; порядок плеч сохраняется.
#   2. SS не ставит задачи на дисковый узел (0 из 60), ошибка размещения
#      у него на порядок меньше, чем у соперников.
#   3. ss_agent_pmu_multiplex_ratio = 1.000 на всех bench-узлах в течение
#      прогона: агент открывает 4 события на под, счётчиков ровно 4
#      (см. блок A5-прогноз в docs/Аудит и план работ.md).
#   4. Абсолютные времена могут отличаться от июльских на величину дрейфа
#      облака (до ±23% между сессиями) — сравнивать надо ПОРЯДОК плеч и
#      метрики решения, а не абсолютные секунды. Эталоны снимаются той же
#      сессией именно поэтому.
#
# Запуск: make series SERIES=final

extends: config-stage-mixed-calib.yaml

output:
  results_dir: "results"
  results_file: "results-stage-final.parquet"
  baselines_file: "baselines-stage-final.parquet"
