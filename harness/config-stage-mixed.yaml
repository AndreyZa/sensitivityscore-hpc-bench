# config-stage-mixed.yaml — смешанный (трёхвекторный) сценарий на STAGE:
# на КАЖДОМ из трёх измерительных узлов свой шторм (кэш / диск / сеть),
# чистых узлов нет by design. Жертвы трёх профилей приходят одним
# пуассоновским потоком; качество решения планировщика — СОПОСТАВЛЕНИЕ:
# поставить каждую задачу на узел, шторм которого ей безразличен, и не
# ставить на шторм её собственной оси. Это разводит SensitivityScore
# (пер-задачный вектор чувствительности) и trimaran (одна CPU-метрика на
# все задачи): «уйти от нагруженного узла вообще» здесь не работает —
# нагружены все.
#
# Уроки LLC-серии, учтённые здесь:
#   - самодавление жертв: high-s поднимает misses/sec чистого узла и сужает
#     контраст — в смешанном тесте контраст между узлами по КАЖДОЙ оси
#     задаётся штормами явно, самодавление лишь добавляет шум;
#   - скученность vs шторм: у SS нет «пустого» узла-магнита, победа
#     возможна только правильным распределением по всем трём узлам.
#
# ПЕРЕД запуском:
#   1. weights.json -> три оси (СОВПАДАЕТ со score_weights ниже):
#      kubectl -n sensitivityscore-system patch cm sensitivity-config --type merge \
#        -p '{"data":{"weights.json":"{\"llc\": 1.0, \"numa\": 0.0, \"net\": 1.0, \"io\": 1.0}\n"}}'
#      + kubectl -n sensitivityscore-system rollout restart deployment/sensitivityscore-scheduler
#   2. Эталоны НЕ гонять: baselines-stage-mixed.parquet собирается слиянием
#      уже измеренных per-node эталонов PMU-тройки (см. README серии /
#      команду в журнале): high-s из baselines-stage-llc.parquet, low-s из
#      baselines-stage-topup.parquet, high-s-io/net из baselines-stage-topup2.parquet.
#   3. ./run-stage-mixed.sh (только --pressure).

extends: config-stage-base.yaml

profiles:
  - low-s      # контраст fingerprint; в pressure-потоке не участвует
  - high-s
  - high-s-io
  - high-s-net

# Все три оси. NUMA=0 честно (один домен на узел).
score_weights:
  llc: 1.0
  numa: 0.0
  net: 1.0
  io: 1.0

pressure_scenarios:
  - name: mixed3
    # Жертвы трёх профилей одним потоком (чередование round-robin по
    # прибытию); идеальное размещение — каждая на узел ЧУЖОЙ оси.
    victims:
      - { profile: high-s, count: 2 }      # токсичен кэш-шторм (w8)
      - { profile: high-s-io, count: 2 }   # токсичен дисковый шторм (w9)
      - { profile: high-s-net, count: 2 }  # токсичен сетевой шторм (w10)
    victim_arrival:
      mode: poisson
      interval_seconds: 25
    # intensity-ось (колонка overcommit в результатах) — агрессоров на узел.
    aggressors_per_node: [2]
    # Свой шторм на каждом узле; toxic_for — для метрики ошибочного
    # сопоставления в статусе/анализе (на деплой не влияет).
    storms:
      - node: worker-192.168.0.8
        mode: stress
        args: ["--stream", "2"]
        per_node: 2
        toxic_for: [high-s]
      - node: worker-192.168.0.9
        mode: stress
        args: ["--hdd", "2", "--hdd-bytes", "1g"]
        per_node: 2
        toxic_for: [high-s-io]
      - node: worker-192.168.0.10
        mode: net
        per_node: 2
        net_bitrate_mbps: 400
        toxic_for: [high-s-net]
    stabilize_seconds: 30
    repetitions: 10

output:
  results_dir: "results"
  results_file: "results-stage-mixed.parquet"
  baselines_file: "baselines-stage-mixed.parquet"
