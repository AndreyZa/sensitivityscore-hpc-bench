# One-shot pilot run (checklist item 9: 1 plan point, 3 reps, config A only),
# executed FROM INSIDE the cluster — no port-forward, Redis reached via
# config.yaml's default in-cluster DNS name. Apply harness/deploy/rbac.yaml
# and pvc.yaml first. See harness/README.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: harness-pilot
  namespace: sensitivityscore-bench
spec:
  backoffLimit: 0 # one attempt — rerun manually (kubectl delete -f, then apply again) rather than letting k8s silently resubmit the whole plan
  template:
    spec:
      serviceAccountName: harness-runner
      restartPolicy: Never
      # Пиннинг КРИТИЧЕН для валидности замеров: харнесс — посторонний
      # процесс, а весь стенд построен на том, что на измерительных узлах
      # (bench) не крутится ничего лишнего. Без nodeSelector планировщик
      # клал этот под на bench, и он весь прогон шумел на LLC и памяти
      # ровно того узла, чувствительность которого серия и измеряет —
      # систематическое смещение, не видное ни в одном логе.
      # Толерантность нужна: ss-system несёт taint NoSchedule.
      nodeSelector:
        node-role.kubernetes.io/ss-system: ""
      tolerations:
        - key: node-role.kubernetes.io/ss-system
          operator: Exists
          effect: NoSchedule
      containers:
        - name: harness
          image: andreyza/harness:dev
          imagePullPolicy: Always
          args: ["--pilot", "--configs", "A"]
          volumeMounts:
            - name: results
              mountPath: /app/results
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: harness-results
