# Mounts the same PVC the harness Jobs write results.parquet into, purely so
# `kubectl cp` has a live container to exec into — it can't target a
# completed Job pod. `make harness-fetch-results` applies this, copies the
# file out, and leaves it running for repeated fetches (delete manually with
# `kubectl delete -f` when done, or `make harness-clean-full`).
apiVersion: v1
kind: Pod
metadata:
  name: harness-results-reader
  namespace: sensitivityscore-bench
spec:
  containers:
    - name: reader
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: results
          mountPath: /results
          readOnly: true
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  volumes:
    - name: results
      persistentVolumeClaim:
        claimName: harness-results
