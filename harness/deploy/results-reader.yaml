# Mounts the same PVC the harness Jobs write results.parquet into, purely so
# `kubectl cp` has a live container to exec into — it can't target a
# completed Job pod. `make harness-fetch-results` applies this, copies the
# file out, and leaves it running for repeated fetches (delete manually with
# `kubectl delete -f` when done, or `make harness-clean-full`).
apiVersion: v1
kind: Pod
metadata:
  name: harness-results-reader
  namespace: sensitivityscore-bench
spec:
  # Пиннинг КРИТИЧЕН для валидности замеров: этот под — посторонний процесс,
  # а весь стенд построен на том, что на измерительных узлах (bench) не
  # крутится ничего лишнего. Без nodeSelector планировщик клал его на bench,
  # и он жил там часами (sleep 3600, к тому же оставляется намеренно для
  # повторных kubectl cp), шумя на узле, чувствительность которого серия и
  # измеряет. Толерантность нужна: ss-system несёт taint NoSchedule.
  nodeSelector:
    node-role.kubernetes.io/ss-system: ""
  tolerations:
    - key: node-role.kubernetes.io/ss-system
      operator: Exists
      effect: NoSchedule
  containers:
    - name: reader
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: results
          mountPath: /results
          readOnly: true
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  volumes:
    - name: results
      persistentVolumeClaim:
        claimName: harness-results
