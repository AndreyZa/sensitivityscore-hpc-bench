# Full plan matrix restricted to config A (10 reps x profiles x overcommit —
# B/C/D need infra this local cluster doesn't have, see docs §0). Executed
# FROM INSIDE the cluster — no port-forward. Apply harness/deploy/rbac.yaml
# and pvc.yaml first. See harness/README.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: harness-config-a
  namespace: sensitivityscore-bench
spec:
  backoffLimit: 0 # one attempt — rerun manually rather than letting k8s silently resubmit the whole plan
  template:
    spec:
      serviceAccountName: harness-runner
      restartPolicy: Never
      containers:
        - name: harness
          image: andreyza/harness:dev
          imagePullPolicy: Always
          args: ["--configs", "A"]
          volumeMounts:
            - name: results
              mountPath: /app/results
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: harness-results
