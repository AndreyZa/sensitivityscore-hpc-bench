# config.yaml — experiment plan factors (Программа_экспериментов §7.1).
#
# Edit this file to run a pilot series before the full matrix
# (docs §6, checklist item 9: "Прогнать пилотную серию (1 точка плана, 3 повтора)
# на A — sanity-check всего пайплайна перед полной матрицей").

configs:
  - A # K8s bare-metal: default-scheduler AND sensitivityscore, see below
  - B # K8s + KubeVirt
  - C # Slurm
  - D # Slinky / slurm-bridge (overcommit=1.0 only — whole-node allocation, see §3.1)

# Note: configs A and B are each expanded into <X>-default / <X>-sensitivityscore
# variants inside run_experiment.py:expand_configs() (same-infra A/B comparison
# for H1/H2) — this is hardcoded there, not configurable here.

profiles:
  - low-s
  - high-s

overcommit_ratios: [1.0, 1.5, 2.0]

# ВАЖНО: overcommit ratio переводится в РЕАЛЬНОЕ число одновременно
# запускаемых job через node_capacity_jobs (batch_size = round(node_capacity_jobs * overcommit),
# см. run_experiment.py:batch_size_for()). Раньше overcommit был только
# меткой и не влиял на поведение — каждый job гонялся изолированно вне
# зависимости от overcommit, из-за чего H1 (co-location) фактически не
# проверялся ни разу. Подбери число под реальную capacity узлов твоего
# стенда — дефолт (2) выбран так, чтобы 1.0/1.5/2.0 давали разное число
# job (2/3/4) даже без точных цифр реального железа, для локальной отладки.
node_capacity_jobs: 2

repetitions: 10

cooldown_seconds: 30 # pause between runs, let the node cool from the previous run

# Per-config submission backend, see harness/submit/*.py
backends:
  A: k8s
  B: k8s
  C: slurm
  D: k8s # slurm-bridge: same kubectl path as A, different schedulerName

# Kubernetes connection (used by submit/k8s_submit.py)
kubernetes:
  namespace: sensitivityscore-bench
  job_timeout_seconds: 1800
  poll_interval_seconds: 5 # Job status poll (completion OR failure — fast fail)

# Slurm connection (used by submit/slurm_submit.py) — assumes sbatch/sacct/squeue
# are on PATH, typically run from a login node or a node with Slurm client tools.
slurm:
  poll_interval_seconds: 5
  job_timeout_seconds: 1800

# Where harness output (results.parquet) is written.
# Docker-образ нагрузки Geant4 — ДОЛЖЕН совпадать с тем, что реально собран
# и запушен (`make image-workload`, см. переменную WORKLOAD_IMAGE в
# корневом Makefile). Раньше это было захардкожено плейсхолдером
# "sensitivityscore-bench/geant4:11.2" внутри шаблона job-template.yaml.j2
# и никогда не переопределялось — здесь фактическое значение.
images:
  workload: "andreyza/geant4:11.2"

output:
  results_dir: "results"
  results_file: "results.parquet"

redis:
  addr: "redis.sensitivityscore-system.svc.cluster.local:6379"
