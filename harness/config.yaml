# config.yaml — experiment plan factors (Программа_экспериментов §7.1).
#
# Edit this file to run a pilot series before the full matrix
# (docs §6, checklist item 9: "Прогнать пилотную серию (1 точка плана, 3 повтора)
# на A — sanity-check всего пайплайна перед полной матрицей").

configs:
  - A # K8s bare-metal: default-scheduler AND sensitivityscore, see below
  - B # K8s + KubeVirt
  - C # Slurm
  - D # Slinky / slurm-bridge (overcommit=1.0 only — whole-node allocation, see §3.1)

# Configs A и B разворачиваются в плечи-варианты планировщика в пределах одной
# инфраструктуры (run_experiment.py:expand_configs). Набор плеч задаётся здесь:
scheduler_variants:
  - default # штатный kube-scheduler (schedulerName default-scheduler)
  - sensitivityscore # наш interference-aware плагин (H1/H2)
  # - trimaran        # РАСКОММЕНТИРОВАТЬ для load-aware контрольного бейзлайна
  #                   # (H1-trimaran): доказывает, что выигрыш даёт S-вектор, а
  #                   # не «любой учёт загрузки». Добавляет третье плечо ко ВСЕМ
  #                   # точкам плана и pressure-сценариям (дороже) и требует
  #                   # metrics-server на стенде (`make trimaran-deps`).

profiles:
  - low-s
  - high-s

overcommit_ratios: [1.0, 1.5, 2.0]

# ВАЖНО: overcommit ratio переводится в РЕАЛЬНОЕ число одновременно
# запускаемых job через node_capacity_jobs (batch_size = round(node_capacity_jobs * overcommit),
# см. run_experiment.py:batch_size_for()). Раньше overcommit был только
# меткой и не влиял на поведение — каждый job гонялся изолированно вне
# зависимости от overcommit, из-за чего H1 (co-location) фактически не
# проверялся ни разу. Подбери число под реальную capacity узлов твоего
# стенда — дефолт (2) выбран так, чтобы 1.0/1.5/2.0 давали разное число
# job (2/3/4) даже без точных цифр реального железа, для локальной отладки.
node_capacity_jobs: 2

repetitions: 10

cooldown_seconds: 30 # pause between runs, let the node cool from the previous run

# Веса осей скор-функции для расчёта placement regret харнессом
# (submit/node_pressure.py). ДОЛЖНЫ совпадать с weights.json из ConfigMap
# sensitivity-config (k8s/scheduler-config/sensitivity-configmap.yaml) —
# иначе regret считается не по той функции, которой пользуется плагин.
# Net отсутствует намеренно: он исключён и из score плагина.
score_weights:
  llc: 1.0
  numa: 1.0
  io: 1.0

# --- Соло-бейзлайны (run_experiment.py --baseline) ---
# Каждый профиль (матричные + жертвы pressure-сценариев) гоняется
# repetitions раз строго последовательно на ПУСТОМ кластере ->
# results/baselines.parquet. Из них analysis берёт: знаменатели slowdown
# (makespan_isolated per profile) и fingerprint «заявленный vs измеренный S».
baseline:
  repetitions: 5
  config: A-default # через какой планировщик сабмитить (на пустом кластере не влияет на makespan)

# Per-config submission backend, see harness/submit/*.py
backends:
  A: k8s
  B: k8s
  C: slurm
  D: k8s # slurm-bridge: same kubectl path as A, different schedulerName

# Kubernetes connection (used by submit/k8s_submit.py)
kubernetes:
  namespace: sensitivityscore-bench
  job_timeout_seconds: 1800
  poll_interval_seconds: 5 # Job status poll (completion OR failure — fast fail)

# Slurm connection (used by submit/slurm_submit.py) — assumes sbatch/sacct/squeue
# are on PATH, typically run from a login node or a node with Slurm client tools.
slurm:
  poll_interval_seconds: 5
  job_timeout_seconds: 1800

# Where harness output (results.parquet) is written.
# Docker-образ нагрузки Geant4 — ДОЛЖЕН совпадать с тем, что реально собран
# и запушен (`make image-workload`, см. переменную WORKLOAD_IMAGE в
# корневом Makefile). Раньше это было захардкожено плейсхолдером
# "sensitivityscore-bench/geant4:11.2" внутри шаблона job-template.yaml.j2
# и никогда не переопределялось — здесь фактическое значение.
images:
  workload: "andreyza/geant4:11.2"
  aggressor: "andreyza/aggressor:dev" # stress-ng, см. aggressor/Dockerfile

# --- Pressure-сценарий («money experiment», run_experiment.py --pressure) ---
# Фаза 1: на pressured_node_count worker-нод (или явные aggressor_nodes)
# сажаются агрессоры stress-ng --stream, aggressors_per_node штук на ноду —
# это ось интенсивности (dose-response), она же пишется в колонку overcommit.
# Фаза 2: после stabilize_seconds через планировщик плеча подаётся поток из
# victim_count жертв (victim_arrival: fixed | poisson); паттерн прибытия
# одинаков для обоих плеч A-default/A-sensitivityscore (seed от плеча не
# зависит), pressured-ноды тоже (nodeName-пин мимо планировщиков) —
# единственное различие плеч = планировщик жертв.
#
# Научный тезис сценария: агрессор с маленьким cpu-request невидим для
# ресурсной модели default-планировщика (нода выглядит свободной), но давит
# LLC/полосу памяти — ровно тот случай, где requests недопредставляют
# контенцию, и interference-awareness должна дать измеримый выигрыш.
pressure_scenarios:
  - name: llc
    victim_profile: high-s
    victim_count: 6
    victim_arrival:
      mode: poisson # fixed | poisson
      interval_seconds: 30 # средний интервал; держать БОЛЬШЕ лага метрик (~15с)
    aggressors_per_node: [1, 2]
    pressured_node_count: 1 # сколько worker-нод давим (минимум одна должна остаться чистой)
    aggressor_nodes: [] # явный список нод важнее pressured_node_count
    stabilize_seconds: 30
    repetitions: 10
    aggressor_args: ["--stream", "2"] # LLC/полоса памяти

  # IO-ось: диск-агрессор (--hdd пишет/читает реальные файлы в /scratch ->
  # PSI io.pressure на ноде растёт) + жертва high-s-io, которая КРОМЕ
  # compute реально пишет на диск (OUTPUT_MODE=burst, см. profiles.py и
  # workload/entrypoint.sh) — без реального IO у жертвы дисковая контенция
  # не влияла бы на её makespan, и сценарий мерил бы честный ноль.
  # ОСТОРОЖНО с интенсивностью на средах с ОБЩИМ диском (dev/WSL2, один
  # virtual disk на все "ноды" И на etcd): IO-шторм сценария может довести
  # apiserver до сброса соединений (подтверждено первым smoke: 4 hdd-воркера
  # с fsync -> node io_pressure 0.79 -> etcd starvation). На стенде с
  # отдельными дисками на узел это не проблема, но начинать стоит с
  # aggressors_per_node: [1] и наращивать по dose-response.
  - name: io
    victim_profile: high-s-io
    victim_count: 6
    victim_arrival:
      mode: poisson
      interval_seconds: 30
    aggressors_per_node: [1, 2]
    pressured_node_count: 1
    aggressor_nodes: []
    stabilize_seconds: 30
    repetitions: 10
    aggressor_args: ["--hdd", "1", "--hdd-bytes", "1g"]

aggressor:
  default_args: ["--stream", "2"] # если сценарий не задал aggressor_args
  cpu_request: "500m" # намеренно мало — невидим для ресурсной модели default-планировщика
  cpu_limit: "2"

output:
  results_dir: "results"
  results_file: "results.parquet"
  baselines_file: "baselines.parquet" # выход --baseline (соло-прогоны, отдельно от results)

redis:
  addr: "redis.sensitivityscore-system.svc.cluster.local:6379"
