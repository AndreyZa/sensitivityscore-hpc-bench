# config-stage.yaml — STAGE (dev+) стенд: облачный кластер Timeweb, воркеры
# по 2 vCPU, managed control-plane. Отличия от config.yaml (bare-metal план):
#
#   - LLC ИЗМЕРИМ и на этих VM. Раньше здесь стояло «PMU недоступен
#     (perf_event_open -> EINVAL)», но тот EINVAL оказался нашим багом
#     (cgroup-scoped события требуют cpu>=0, агент открывал с cpu=-1) — после
#     фикса cgroup-scoped perf на STAGE-нодах считает ЧЕСТНО: perfcheck дал
#     ~3.1M cache-misses на worker-192.168.0.5 (не нули, как VMware Workstation).
#     Timeweb-облако (KVM) виртуализирует cgroup-PMU корректно. То есть
#     LLC-абляция на STAGE ВОЗМОЖНА; IO/Net-фокус ниже — это осознанный ВЫБОР
#     области, а не аппаратное ограничение.
#   - NUMA по-прежнему вырождена: 1 NUMA-домен на узел (node0, cpulist 0-1) —
#     это железо, а не баг; node_load_misses = ENOENT, numa_remote_ratio ≡ 0.
#     Поэтому numa weight = 0 честно отражает стенд.
#   - Профили под 2 vCPU задаются env-оверрайдами HARNESS_OVERRIDE_* (см.
#     profiles.py) при запуске харнесса с хоста — тут они не дублируются.
#   - Текущий центр тяжести серии — IO/Net pressure-сценарии (диск/сеть-
#     агрессор + жертвы high-s-io/high-s-net). Для LLC-серии переключить
#     score_weights (llc>0) И weights.json ConfigMap sensitivity-config, взяв
#     llc-сценарий из config.yaml. Batch-матрица и B/C/D — вне фокуса стенда.
#
# Запуск с хоста (см. README «Альтернатива: запуск с хоста»):
#   export KUBECONFIG=~/.kube/configs/timeweb-stage
#   export REDIS_ADDR=localhost:16379   # после port-forward svc/redis
#   export HARNESS_OVERRIDE_HIGH_S_IO_CPU=1 HARNESS_OVERRIDE_HIGH_S_IO_THREADS=2 \
#          HARNESS_OVERRIDE_HIGH_S_IO_PRIMARIES=300000 \
#          HARNESS_OVERRIDE_HIGH_S_IO_MEM_REQ=1Gi HARNESS_OVERRIDE_HIGH_S_IO_MEM_LIM=2Gi \
#          HARNESS_OVERRIDE_LOW_S_PRIMARIES=300000
#   python run_experiment.py --config config-stage.yaml --baseline
#   python run_experiment.py --config config-stage.yaml --pressure --scenarios io

configs:
  - A

scheduler_variants:
  - default
  - sensitivityscore
  # Контрольное плечо H1-trimaran (load-aware, но не interference-aware):
  # профиль trimaran задеплоен на STAGE, metrics-server у k0s из коробки,
  # collector читает метрики (проверено в логах). На STAGE Trimaran особенно
  # показателен: --hdd-агрессоры потребляют заметный CPU, так что частично
  # он шторм «видит» через утилизацию — если sensitivityscore всё равно
  # лучше, IO-сигнал незаменим; если сравнимы — честно так и напишем.
  - trimaran

# Ноды, на которые НЕ ставить поды (nodeAffinity NotIn, без cordon/taint).
# worker-192.168.0.7 изначально была без egress к Docker Hub, но её
# пересоздали — теперь тянет образы, поэтому список пуст (все 3 ноды в игре).
# Оставлено как ручка на случай повторения проблемы.
exclude_nodes: []

profiles:
  - low-s      # io=low  — контраст для fingerprint
  - high-s-io  # io=high — жертва IO-сценария

overcommit_ratios: [1.0] # batch-матрица не в фокусе стенда
node_capacity_jobs: 1     # 2 vCPU на ноду — держим по одному job на ноду
repetitions: 5
cooldown_seconds: 20

# Абляция под ТЕКУЩУЮ IO/Net-серию: LLC=0 — это выбор области, а не «PMU нет»
# (LLC на STAGE измерим, см. шапку файла); NUMA=0 честно (1 домен). Измеримы
# IO (PSI io.pressure), Net (net_pressure после калибровки NET_REFERENCE_MBPS,
# см. make netcheck-run) и, при желании отдельной серии, LLC. Веса ДОЛЖНЫ
# совпадать с weights.json ConfigMap sensitivity-config.
score_weights:
  llc: 0.0
  numa: 0.0
  net: 1.0
  io: 1.0

backends:
  A: k8s

kubernetes:
  namespace: sensitivityscore-bench
  job_timeout_seconds: 900
  poll_interval_seconds: 5

slurm:
  poll_interval_seconds: 5
  job_timeout_seconds: 900

images:
  workload: "andreyza/geant4:11.2"
  aggressor: "andreyza/aggressor:dev"

# IO pressure-сценарий — единственный на этом стенде. Диск-агрессор на одном
# воркере (второй остаётся чистым), поток high-s-io жертв через планировщик
# каждого плеча. Managed control-plane -> IO-шторм воркера не заденет etcd
# (в отличие от kind), диски у VM раздельные (sda per-node).
pressure_scenarios:
  - name: io
    victim_profile: high-s-io
    victim_count: 6
    victim_arrival:
      mode: poisson
      interval_seconds: 25
    aggressors_per_node: [2]
    pressured_node_count: 1
    # Давим worker-7 — ноду с НАИМЕНЬШИМ числом чужих подов (самую «пустую»),
    # т.е. ту, которую LeastAllocated default-планировщика предпочитает больше
    # всех. Агрессор невидим по ресурсам (cpu 10m / mem 32Mi), так что default
    # продолжает считать worker-7 лучшей и заводит туда жертв — прямо в шторм.
    # sensitivityscore видит высокий io_pressure worker-7 и уводит жертв на
    # 2 чистые ноды (worker-5/worker-6) — их ёмкости хватает без переполнения.
    aggressor_nodes: ["worker-192.168.0.7"]
    stabilize_seconds: 30
    # 10 реп для статзначимости: при n=3 Mann-Whitney физически не даёт
    # p<0.05 (минимум 0.1) — v5-серия с Cliff's delta −1.0 по всем метрикам
    # это показала. 10×3 плеча ~ 2.5-3 часа на STAGE.
    repetitions: 10
    aggressor_args: ["--hdd", "2", "--hdd-bytes", "1g"]

  # Net-шторм: iperf3-пары (сервер+UDP-клиент) на штормимой ноде, трафик
  # pod-to-pod через veth — net_bw/net_pressure растёт только у неё (см.
  # aggressors.py про cross-node вариант). Жертва high-s-net декларирует
  # net=high; вычислительно она сети не генерирует (честная оговорка в
  # profiles.py) — сценарий валидирует детекцию шторма и решения
  # планировщика (placement/regret + slowdown-per-node как честный исход).
  - name: net
    victim_profile: high-s-net
    victim_count: 6
    victim_arrival:
      mode: poisson
      interval_seconds: 25
    aggressors_per_node: [2]
    pressured_node_count: 1
    # Та же логика выбора ноды, что у io-сценария: самая «пустая» нода —
    # любимица LeastAllocated, агрессоры по requests невидимы.
    aggressor_nodes: ["worker-192.168.0.7"]
    aggressor_mode: net
    # Битрейт одного UDP-клиента (Mbit/s). Итоговое node-давление ~
    # 2 пары * (tx клиента + rx сервера) = 4x битрейт против калибровки
    # NET_REFERENCE_MBPS — подобрать после netcheck так, чтобы net_pressure
    # штормимой ноды был >~0.7 (клампится в 1.0, перелёт не страшен).
    net_bitrate_mbps: 400
    stabilize_seconds: 30
    repetitions: 10

aggressor:
  default_args: ["--hdd", "2", "--hdd-bytes", "1g"]
  # И cpu, И память крошечные — агрессор обязан быть невидим для ресурсной
  # модели default по ОБЕИМ осям. На 1.9Gi-нодах 512Mi-request агрессора (×2)
  # не давал жертве 1Gi влезть -> оба планировщика избегали ноду по ПАМЯТИ, а
  # не по IO. С 32Mi жертва влезает, и слепой default её туда ставит.
  cpu_request: "10m"
  cpu_limit: "2"
  mem_request: "32Mi"
  mem_limit: "512Mi"

baseline:
  # per_node (дефолт true): каждый профиль пинуется на КАЖДУЮ worker-ноду —
  # ноды STAGE аппаратно неоднородны (пересозданный worker-7 в ~1.9x
  # медленнее w5/w6 при идентичной конфигурации), общий знаменатель slowdown
  # приписывал разницу железа интерференции (см. results-stage-final10-
  # confounded.parquet). 3 профиля x 3 ноды x 3 репы ~ 40-50 мин.
  repetitions: 3
  config: A-default

output:
  results_dir: "results"
  results_file: "results-stage.parquet"
  baselines_file: "baselines-stage.parquet"

redis:
  addr: "redis.sensitivityscore-system.svc.cluster.local:6379"
