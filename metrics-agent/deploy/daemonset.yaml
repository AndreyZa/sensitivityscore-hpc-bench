# DaemonSet — один агент на узел, CAP_PERFMON вместо privileged:true (docs §3.1:
# "это будет аргументом в защите, что подход безопаснее, чем грубый
# privileged-доступ").
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sensitivityscore-metrics-agent
  namespace: sensitivityscore-system
  labels:
    app: sensitivityscore-metrics-agent
spec:
  selector:
    matchLabels:
      app: sensitivityscore-metrics-agent
  template:
    metadata:
      labels:
        app: sensitivityscore-metrics-agent
      annotations:
        # Скрейп-цель Prometheus (k8s/monitoring): узловые оси PressureVector
        # зеркалятся в /metrics (pkg/promexport). На bench-узлах агент —
        # ЕДИНСТВЕННАЯ цель мониторинга: node_exporter туда намеренно не
        # ставится, чтобы не шуметь в LLC/IO измерительных узлов
        # (docs «Ввод прод-стенда (Этап 0)» §2), а сам агент там и так уже
        # работает — скрейп не добавляет на узел ни одного процесса.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sensitivityscore-metrics-agent
      hostPID: true # needed to read /proc/<pid>/cgroup for non-pod processes (qemu-kvm, config B)
      containers:
        - name: agent
          image: andreyza/metrics-agent:dev
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["PERFMON", "SYS_PTRACE"] # SYS_PTRACE only needed for cross-namespace /proc reads (config B)
            privileged: false
          ports:
            - name: metrics
              containerPort: 9101
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: REDIS_ADDR
              value: "redis.sensitivityscore-system.svc.cluster.local:6379"
            - name: SAMPLE_INTERVAL_SECONDS
              # 5s is fine now that the low-s profile runs ~30-60s (see
              # harness/profiles.py N_PRIMARIES) — every job gets several
              # real samples per lifetime. The earlier "1" here was a
              # workaround for 1-2s low-s jobs being invisible to the
              # sampler (first tick only primes the baseline); fixing the
              # job duration was the real fix, and 5s keeps per-node
              # kube-apiserver LIST traffic 5x lower for the partner stand.
              value: "5"
            # Калибровки стенда — из ConfigMap metrics-agent-calibration, НЕ
            # из этого манифеста. Пока здесь стояло value: "", любой
            # `kubectl apply -f daemonset.yaml` молча обнулял выставленные
            # значения: 2026-07-18 так потерялись NET=1616 и LLC=15000000,
            # жившие с 14 июля, — Net-ось выключилась, а llc_miss_rate
            # вернулся к сырому ratio, который инвертируется под нагрузкой.
            # ConfigMap апплаем DaemonSet'а не затрагивается.
            #
            # optional: true — без ConfigMap переменные просто отсутствуют, и
            # агент честно выключает соответствующие оси (прежнее поведение).
            # Задавать: make calibration-apply / make netcheck-apply.
            - name: NET_REFERENCE_MBPS
              valueFrom:
                configMapKeyRef:
                  name: metrics-agent-calibration
                  key: NET_REFERENCE_MBPS
                  optional: true
            - name: LLC_REFERENCE_MISSES_PER_SEC
              valueFrom:
                configMapKeyRef:
                  name: metrics-agent-calibration
                  key: LLC_REFERENCE_MISSES_PER_SEC
                  optional: true
          volumeMounts:
            # NOTE: no /host/proc mount — hostPID: true already makes the
            # container's own /proc show every host process (net.go reads
            # /proc/<pid>/net/dev directly). Re-add a proc hostPath only if
            # the config-B QemuProcessResolver ever needs a non-PID view.
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
      tolerations:
        - operator: Exists # run on every node, including tainted control-plane/HPC nodes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensitivityscore-metrics-agent
  namespace: sensitivityscore-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sensitivityscore-metrics-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch", "get"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["list", "watch", "get"] # for config B VMI -> qemu PID mapping
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensitivityscore-metrics-agent
subjects:
  - kind: ServiceAccount
    name: sensitivityscore-metrics-agent
    namespace: sensitivityscore-system
roleRef:
  kind: ClusterRole
  name: sensitivityscore-metrics-agent
  apiGroup: rbac.authorization.k8s.io
