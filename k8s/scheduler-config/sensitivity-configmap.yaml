# Веса скор-функции — метрики нод теперь приходят из Redis
# (node:metrics:<node>, см. metrics-agent и pkg/sensitivityscore/redis_source.go
# в форке scheduler-plugins), а не из этого ConfigMap; здесь остались только
# веса.
#
# weights.json — правка этого файла = абляционное исследование (Глава 3):
# меняешь число, ждёшь ~10с, смотришь на изменившиеся score в логах
# scheduler-плагина — без пересборки и рестарта пода.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sensitivity-config
  namespace: sensitivityscore-system
data:
  weights.json: |
    {"llc": 1.0, "numa": 1.0, "net": 1.0, "io": 1.0}
