# Не Helm-чарт, а прямой манифест для быстрой локальной отладки — де-шаблонизированная
# версия manifests/install/charts/as-a-second-scheduler/templates/deployment.yaml
# из репозитория kubernetes-sigs/scheduler-plugins, плюс добавленный
# volumeMount для /etc/sensitivity/ (node-metrics.json + weights.json, см.
# sensitivity-configmap.yaml).
#
# Образ плагина СОБИРАЕТСЯ В ДРУГОМ РЕПОЗИТОРИИ (форк scheduler-plugins,
# `make -f sensitivityscore.mk ss-image`) — здесь только деплой готового
# образа. См. Makefile этого репозитория, таргет `scheduler-plugin-image`,
# который вызывает сборку в форке и передаёт сюда переменную SCHEDULER_IMAGE.
apiVersion: v1
kind: Namespace
metadata:
  name: sensitivityscore-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensitivityscore-scheduler
  namespace: sensitivityscore-system
  labels:
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      component: scheduler
  template:
    metadata:
      labels:
        component: scheduler
    spec:
      serviceAccountName: sensitivityscore-scheduler
      containers:
        - name: sensitivityscore-scheduler
          image: REPLACE_ME_IMAGE # подставляется через `make scheduler-deploy` (переменная SCHEDULER_IMAGE)
          imagePullPolicy: IfNotPresent
          command:
            - /bin/kube-scheduler
          args:
            - --config=/etc/kubernetes/scheduler-config.yaml
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
          securityContext:
            privileged: false
          volumeMounts:
            - name: scheduler-config
              mountPath: /etc/kubernetes
              readOnly: true
            - name: sensitivity-config
              mountPath: /etc/sensitivity
              readOnly: true
      hostNetwork: false
      hostPID: false
      volumes:
        - name: scheduler-config
          configMap:
            name: scheduler-config
        - name: sensitivity-config
          configMap:
            name: sensitivity-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensitivityscore-scheduler
  namespace: sensitivityscore-system
---
# Права те же, что нужны штатному kube-scheduler (список нод/подов, patch
# binding и т.д.) — минимальный набор для локальной отладки; на реальном
# стенде используйте ClusterRole из
# manifests/install/charts/as-a-second-scheduler (kube-scheduler ClusterRole)
# вместо этой урезанной версии.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensitivityscore-scheduler
subjects:
  - kind: ServiceAccount
    name: sensitivityscore-scheduler
    namespace: sensitivityscore-system
roleRef:
  kind: ClusterRole
  name: system:kube-scheduler
  apiGroup: rbac.authorization.k8s.io
