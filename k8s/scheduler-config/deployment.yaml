# Не Helm-чарт, а прямой манифест для быстрой локальной отладки — де-шаблонизированная
# версия manifests/install/charts/as-a-second-scheduler/templates/deployment.yaml
# из репозитория kubernetes-sigs/scheduler-plugins, плюс добавленный
# volumeMount для /etc/sensitivity/ (node-metrics.json + weights.json, см.
# sensitivity-configmap.yaml).
#
# Образ плагина СОБИРАЕТСЯ В ДРУГОМ РЕПОЗИТОРИИ (форк scheduler-plugins,
# `make -f sensitivityscore.mk ss-image`) — здесь только деплой готового
# образа. См. Makefile этого репозитория, таргет `scheduler-plugin-image`,
# который вызывает сборку в форке и передаёт сюда переменную SCHEDULER_IMAGE.
apiVersion: v1
kind: Namespace
metadata:
  name: sensitivityscore-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensitivityscore-scheduler
  namespace: sensitivityscore-system
  labels:
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      component: scheduler
  template:
    metadata:
      labels:
        component: scheduler
    spec:
      serviceAccountName: sensitivityscore-scheduler
      containers:
        - name: sensitivityscore-scheduler
          image: REPLACE_ME_IMAGE # подставляется через `make scheduler-deploy` (переменная SCHEDULER_IMAGE)
          imagePullPolicy: Always
          command:
            - /bin/kube-scheduler
          args:
            - --config=/etc/kubernetes/scheduler-config.yaml
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
          securityContext:
            privileged: false
          volumeMounts:
            - name: scheduler-config
              mountPath: /etc/kubernetes
              readOnly: true
            - name: sensitivity-config
              mountPath: /etc/sensitivity
              readOnly: true
      hostNetwork: false
      hostPID: false
      volumes:
        - name: scheduler-config
          configMap:
            name: scheduler-config
        - name: sensitivity-config
          configMap:
            name: sensitivity-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensitivityscore-scheduler
  namespace: sensitivityscore-system
---
# Права для основной логики планирования (ноды, поды, bind, leases для
# leader election) — то же самое, что нужно штатному kube-scheduler.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensitivityscore-scheduler
subjects:
  - kind: ServiceAccount
    name: sensitivityscore-scheduler
    namespace: sensitivityscore-system
roleRef:
  kind: ClusterRole
  name: system:kube-scheduler
  apiGroup: rbac.authorization.k8s.io
---
# Отдельная ClusterRoleBinding для system:volume-scheduler — покрывает
# StorageClass/PersistentVolume/PersistentVolumeClaim, нужные плагину
# VolumeBinding (он остаётся активным по умолчанию наравне с нашим
# SensitivityScore, т.к. scheduler-config.yaml только ДОБАВЛЯЕТ
# SensitivityScore в score, не отключая остальные default-плагины).
# Без этой биндинги реальный kube-scheduler падает именно на
# "storageclasses.storage.k8s.io is forbidden" — задокументировано в
# официальном гайде Kubernetes "Configure Multiple Schedulers".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensitivityscore-scheduler-volume
subjects:
  - kind: ServiceAccount
    name: sensitivityscore-scheduler
    namespace: sensitivityscore-system
roleRef:
  kind: ClusterRole
  name: system:volume-scheduler
  apiGroup: rbac.authorization.k8s.io
---
# Убирает второй warning из логов ("Unable to get configmap/extension-apiserver-authentication
# in kube-system") — сам планировщик стартует и без этого (код деградирует
# gracefully, "Continuing without authentication configuration"), но раз
# сообщение само подсказывает команду фикса — делаем манифестом, чтобы не
# видеть эти строки в логах при каждом старте пода.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sensitivityscore-scheduler-auth-reader
  namespace: kube-system
subjects:
  - kind: ServiceAccount
    name: sensitivityscore-scheduler
    namespace: sensitivityscore-system
roleRef:
  kind: Role
  name: extension-apiserver-authentication-reader
  apiGroup: rbac.authorization.k8s.io
