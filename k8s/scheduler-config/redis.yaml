# Redis метрик-пайплайна (агент пишет, планировщик и харнесс читают).
# Исторически применялся ad-hoc и в репо отсутствовал — теперь источник
# истины здесь. Данные эфемерны (node-ключи с TTL 30с, job-ключи харнесс
# удаляет после экспорта), поэтому без PVC: потеря пода = потеря максимум
# одного окна метрик.
#
# Живёт на выделенном системном узле node=ss-system (см. комментарий в
# deployment.yaml планировщика): не шумит в метрики измерительных узлов —
# в т.ч. не попадает под шторм (14.07.2026 redis оказался на штормовом
# узле w10 после пересоздания).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sensitivityscore-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        node: ss-system
      tolerations:
        - key: ss-system
          operator: Exists
          effect: NoSchedule
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sensitivityscore-system
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
