# Config B (K8s + KubeVirt) — high-S profile.
#
# Same workload as config-a, but running inside a KubeVirt VMI rather than a bare pod —
# scheduling decision still goes through kube-scheduler/SensitivityScore, but the
# NodeStateResolver used by the plugin must be QemuProcessResolver here (VMI -> qemu-kvm
# PID -> cgroup path), since the plugin sees a virt-launcher pod, not a "real" workload
# pod. See docs/Технический_план_экспериментов.md §2.2 and §3.3.
apiVersion: kubevirt.io/v1
kind: VirtualMachineInstance
metadata:
  name: geant4-highs-vmi-rep00
  labels:
    app: geant4-bench
    sensitivityscore.phd/config: "B"
    sensitivityscore.phd/profile: "high-s"
  annotations:
    scheduling.phd/sensitivity-llc: "high"
    scheduling.phd/sensitivity-numa: "high"
    scheduling.phd/sensitivity-net: "low"
    scheduling.phd/sensitivity-io: "low"
    scheduling.phd/job-id: "B-highs-oc1.0-rep00"
    # Set by the metrics-agent vPMU healthcheck at series start (docs §3.3); kept here
    # as a documented default so the manifest is self-describing even before the
    # healthcheck has run once.
    metrics.phd/approximation: "host-side"
spec:
  schedulerName: sensitivityscore
  domain:
    cpu:
      cores: 8
    resources:
      requests:
        memory: "4Gi"
      limits:
        memory: "6Gi"
    devices:
      disks:
        - name: containerdisk
          disk:
            bus: virtio
        - name: cloudinitdisk
          disk:
            bus: virtio
  volumes:
    - name: containerdisk
      containerDisk:
        image: andreyza/geant4-vmdisk:11.2
    - name: cloudinitdisk
      cloudInitNoCloud:
        userData: |
          #cloud-config
          runcmd:
            - export G4_THREADS=8
            - export PHYSICS_LIST=FTFP_BERT_HP
            - export N_PRIMARIES=1000000
            - export OUTPUT_MODE=ntuple
            - export RNG_SEED=42
            - /entrypoint.sh
