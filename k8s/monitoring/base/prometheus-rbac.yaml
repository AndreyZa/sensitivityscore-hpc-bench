apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sensitivityscore-monitoring
---
# Права ровно под scrape-конфиг (prometheus-configmap.yaml): service discovery
# по узлам/подам/сервисам + доступ к /metrics kubelet и cAdvisor через
# nodes/metrics. Ничего на запись — Prometheus здесь только читатель.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sensitivityscore-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sensitivityscore-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: sensitivityscore-monitoring
roleRef:
  kind: ClusterRole
  name: sensitivityscore-prometheus
  apiGroup: rbac.authorization.k8s.io
