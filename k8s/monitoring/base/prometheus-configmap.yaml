apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sensitivityscore-monitoring
data:
  prometheus.yml: |
    # Scrape-конфиг стенда. Ключевое ограничение — ЧИСТОТА ИЗМЕРЕНИЙ:
    # на bench-узлах не должно появиться ни одного нового процесса
    # (docs «Ввод прод-стенда (Этап 0)» §2 — системные компоненты не шумят в
    # LLC/IO/Net измерительных узлов). Поэтому узловые метрики bench снимаются
    # с УЖЕ РАБОТАЮЩИХ там kubelet/cAdvisor и metrics-agent, а node_exporter
    # живёт только на ss-system (см. node-exporter-daemonset.yaml).
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        # Провенанс данных, а не косметика: метка stand отличает прогоны
        # стендов друг от друга (ср. `make ch-load STAND=prod`). Значение
        # подставляется из переменной окружения STAND (см. Deployment,
        # --enable-feature=expand-external-labels), чтобы prod-overlay менял
        # одну переменную, а не копировал весь конфиг.
        stand: ${STAND}

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      # --- сам Prometheus -----------------------------------------------
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      # --- kube-apiserver ------------------------------------------------
      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # --- kubelet: узловые метрики bench БЕЗ node_exporter ---------------
      # role: node уже даёт <InternalIP>:10250. Скрейпим напрямую, а не через
      # /api/v1/nodes/<n>/proxy: узлы в одной приватной сети (192.168.0.0/24),
      # это не нагружает apiserver. Если на другом стенде путь закрыт —
      # переключить на apiserver-proxy (см. README рядом).
      - job_name: kubernetes-nodes-kubelet
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true # kubelet-сертификаты self-signed на k0s
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          # Роль узла (bench/ss-system) отдельной меткой — по ней дашборды
          # отделяют измерительные узлы от системного.
          #
          # ВАЖНО: сверяемся с __meta_kubernetes_node_labelpresent_*, а НЕ с
          # __meta_kubernetes_node_label_*. Роли — метки-флаги с ПУСТЫМ
          # значением ("node-role.kubernetes.io/bench": ""), а Prometheus не
          # отличает пустое значение от отсутствующей метки: regex "" совпал
          # бы на КАЖДОМ узле, оба правила отработали бы на всех, и ss_role у
          # всех стал бы значением последнего правила (проверено на STAGE:
          # все четыре узла получали ss-system). labelpresent даёт "true"
          # ровно там, где метка действительно есть.
          - source_labels: [__meta_kubernetes_node_labelpresent_node_role_kubernetes_io_bench]
            regex: "true"
            target_label: ss_role
            replacement: bench
          - source_labels: [__meta_kubernetes_node_labelpresent_node_role_kubernetes_io_ss_system]
            regex: "true"
            target_label: ss_role
            replacement: ss-system

      # --- cAdvisor: per-pod CPU/mem/IO, тоже из kubelet -------------------
      - job_name: kubernetes-nodes-cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          # cAdvisor отдаёт очень широкий набор; на 2-ядерной ss-system-ноде
          # TSDB дешевле держать узким. Оставляем то, на чём строятся
          # дашборды: CPU/RSS/сеть/файловая система пода.
          - source_labels: [__name__]
            action: keep
            regex: container_(cpu_usage_seconds_total|memory_working_set_bytes|memory_rss|network_(receive|transmit)_bytes_total|fs_(reads|writes)_bytes_total|spec_(cpu_quota|memory_limit_bytes))
          # Пустой container= — это pod-level cgroup, дубль к сумме контейнеров.
          - source_labels: [container]
            action: drop
            regex: ""

      # --- kube-state-metrics --------------------------------------------
      # ОТДЕЛЬНАЯ job, а не общая kubernetes-pods, и это принципиально.
      # KSM экспортирует метрики ПРО другие объекты и несёт собственные метки
      # namespace/pod. Общая job проставляет namespace/pod как метки ЦЕЛИ, и
      # при honor_labels=false (по умолчанию) метка цели побеждает: настоящий
      # namespace уезжает в exported_namespace, а namespace у ВСЕХ серий
      # становится тем, где живёт сам KSM. Тогда
      # kube_pod_status_phase{namespace="sensitivityscore-bench"} всегда пуст,
      # а алерты по namespace тихо считают весь кластер одним неймспейсом.
      # honor_labels: true возвращает приоритет меткам самой метрики.
      - job_name: kube-state-metrics
        honor_labels: true
        static_configs:
          - targets: ["kube-state-metrics.sensitivityscore-monitoring.svc.cluster.local:8080"]

      # --- metrics-agent: оси чувствительности ----------------------------
      # Отдельная job с ЧАСТЫМ интервалом. Причина — разрешение по времени, а
      # не нагрузка: планировщик читает node:metrics:<node> с TTL 30s, и
      # "возраст сэмпла" должен ловить протухание раньше, чем оно случится.
      # При общем интервале 30s наблюдаемый возраст сам по себе доходит до
      # ~35s (время с последнего скрейпа + возраст на момент скрейпа), то
      # есть порог 30s давал бы и ложную тревогу на здоровом стенде, и
      # срабатывание уже ПОСЛЕ потери данных планировщиком. При 10s возраст
      # держится <15s, и порог 30s означает ровно то, что написано на панели.
      # Цель дешёвая: 4 эндпоинта, процессы на узлах уже запущены.
      - job_name: sensitivityscore-metrics-agent
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: sensitivityscore-metrics-agent
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Метку node агент проставляет сам (pkg/promexport), поэтому здесь
          # её НЕ трогаем — иначе она превратилась бы в exported_node.

      # --- поды с prometheus.io/scrape ------------------------------------
      # Сюда попадает node-exporter (только ss-system) и то, что уже несёт
      # аннотации от k0s/Calico (kube-proxy, coredns, calico). KSM и
      # metrics-agent сюда НЕ входят — у них свои job'ы выше.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Агент уже покрыт своей job'ой с интервалом 10s — иначе он попал бы
          # в обе и дал бы две серии на узел с разной частотой.
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: drop
            regex: sensitivityscore-metrics-agent
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Узел, НА КОТОРОМ крутится под. Для metrics-agent это и есть узел
          # измерения: агент уже проставляет метку node= сам (pkg/promexport),
          # но для node-exporter/KSM метка нужна отсюда.
          - source_labels: [__meta_kubernetes_pod_node_name]
            action: replace
            target_label: instance_node
