# Одноразовый Job: дождаться готовности ClickHouse и применить schema.sql
# (таблицы results + baselines). ConfigMap clickhouse-schema создаётся из
# ЕДИНОГО источника db/clickhouse/schema.sql (см. Makefile ch-incluster-deploy),
# чтобы схема не расходилась с загрузчиком. Job может встать на любой узел —
# он лишь коннектится к сервису clickhouse (placement ss-system нужен только
# самому StatefulSet).
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-schema
  labels:
    app: clickhouse
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: clickhouse-schema # НЕ app: clickhouse — иначе под попадёт в эндпоинты сервиса clickhouse
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply-schema
          image: clickhouse/clickhouse-server:25.3
          command: ["/bin/bash", "-c"]
          args:
            # set -e обязателен: без него неудачный apply не прерывал скрипт —
            # печаталось "schema applied", а Job падал лишь потому, что
            # следующий SHOW TABLES не находил БД. При обновлении схемы поверх
            # существующих таблиц это была бы тихая ложь: CREATE TABLE
            # IF NOT EXISTS делает повтор no-op, старые таблицы на месте,
            # SHOW TABLES проходит — Job рапортует успех, а новых колонок нет.
            - |
              set -eu
              until clickhouse-client --host clickhouse -q "SELECT 1" >/dev/null 2>&1; do
                echo "ждём сервис clickhouse..."; sleep 3;
              done
              clickhouse-client --host clickhouse --multiquery < /schema/schema.sql
              echo "схема применена:"; clickhouse-client --host clickhouse -q "SHOW TABLES FROM sensitivityscore"
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: clickhouse-schema
