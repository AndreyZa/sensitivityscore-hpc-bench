# Статус-страница прогона внутри кластера.
#
# Размещение КРИТИЧНО: только ss-system, с толерантностью к его taint. На
# измерительные узлы страница попасть не должна — это посторонний процесс, а
# весь стенд построен на том, что на bench не появляется ничего лишнего
# (k8s/monitoring/README.md, «Ввод §2»).
#
# Живёт в bench-namespace, потому что читает PVC harness-results, куда пишет
# in-cluster харнесс (harness/deploy/job-*.yaml) — PVC не пересекает границу
# неймспейса.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
---
# Права ровно под то, что делает statusserver/cluster.py: перечислить узлы.
# Ничего больше — страница только читает, и RBAC это фиксирует, а не полагается
# на порядочность кода.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: statusserver-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: statusserver-node-reader
subjects:
  - kind: ServiceAccount
    name: statusserver
    namespace: sensitivityscore-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: statusserver-node-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
  labels: {app: statusserver}
spec:
  replicas: 1
  selector:
    matchLabels: {app: statusserver}
  template:
    metadata:
      labels: {app: statusserver}
    spec:
      serviceAccountName: statusserver
      nodeSelector:
        node-role.kubernetes.io/ss-system: ""
      tolerations:
        - key: node-role.kubernetes.io/ss-system
          operator: Exists
          effect: NoSchedule
      containers:
        - name: statusserver
          image: andreyza/statusserver:dev
          imagePullPolicy: Always
          args:
            - --log=/data/series.log
            - --config=/data/config.yaml
            - --results=/data/results.parquet
            - --baselines=/data/baselines.parquet
            - --report=/data/report
            - --scope=full
            - --stand=прод (in-cluster)
            - --port=8787
          ports:
            - {name: http, containerPort: 8787}
          # Страница нужна во время многочасовой серии и не должна с неё
          # ничего отбирать: лимит держим маленьким и прибиваем к ss-system.
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "300m", memory: "512Mi"}
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          readinessProbe:
            httpGet: {path: /, port: 8787}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # Тот же том, куда пишет in-cluster харнесс. readOnly не только в
        # volumeMounts, но и здесь: страницу держат открытой во время серии,
        # и возможности испортить прогон у неё быть не должно.
        - name: data
          persistentVolumeClaim:
            claimName: harness-results
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
  labels: {app: statusserver}
spec:
  selector: {app: statusserver}
  ports:
    - {name: http, port: 8787, targetPort: 8787}
