# Статус-страница прогона внутри кластера.
#
# Размещение КРИТИЧНО: только ss-system, с толерантностью к его taint. На
# измерительные узлы страница попасть не должна — это посторонний процесс, а
# весь стенд построен на том, что на bench не появляется ничего лишнего
# (k8s/monitoring/README.md, «Ввод §2»).
#
# Живёт в bench-namespace, потому что читает PVC harness-results, куда пишет
# in-cluster харнесс (harness/deploy/job-*.yaml) — PVC не пересекает границу
# неймспейса.
#
# ЧЕГО ЭТОТ МАНИФЕСТ ПОКА НЕ УМЕЕТ (проверять на вводе прод-стенда, §C):
#
#  1. [снято 19.07] PVC harness-results объявлен ReadWriteOnce, а дефолтный в
#     k0s local-path-провижнер делает том НОДО-ЛОКАЛЬНЫМ: он привязывается к
#     узлу, где встал под харнесса. Пока харнесс-Job'ы были не прибиты и
#     садились на bench, страница на ss-system смонтировать том не смогла бы
#     и висела бы Pending. Теперь все harness/deploy/job-*.yaml и
#     results-reader.yaml прибиты к ss-system — том оказывается там же, где
#     страница. ПРОВЕРИТЬ на проде: если PVC уже Bound к bench-узлу от старых
#     прогонов, его надо пересоздать, иначе страница так и останется Pending.
#
#  2. --log=/data/series.log и --config=/data/config.yaml НИКТО не пишет:
#     in-cluster харнесс логирует в stdout (kubectl logs), а конфиг вшит в его
#     образ. Пути к parquet верны, остальные — нет, поэтому в кластере страница
#     покажет пустой хвост лога и, без конфига, вообще не нарисует прогресс-бар
#     (см. плашку «Конфиг серии не прочитан»). Нужно либо смонтировать конфиг
#     ConfigMap'ом, либо заставить Job писать лог на PVC.
#
#  3. Под страницы живёт в bench-namespace постоянно, а preflight серии требует
#     этот namespace ПУСТЫМ («N чужих подов в bench») — на проде нужно либо
#     исключить app=statusserver из подсчёта, либо вынести страницу в
#     sensitivityscore-system и дать ей том иначе.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
---
# Права ровно под то, что делает statusserver/cluster.py: перечислить узлы.
# Ничего больше — страница только читает, и RBAC это фиксирует, а не полагается
# на порядочность кода.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: statusserver-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
# Вторая половина того, что делает cluster.py: kubectl_snapshot() перечисляет
# Job'ы и поды-агрессоры в bench-неймспейсе (секция «Текущее состояние
# кластера»). Одних прав на nodes не хватало: секция молча показывала бы текст
# ошибки Forbidden вместо живых задач, а голый `except` в cluster.py превращал
# бы это в пустой список.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: statusserver-bench-reader
  namespace: sensitivityscore-bench
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: statusserver-bench-reader
  namespace: sensitivityscore-bench
subjects:
  - kind: ServiceAccount
    name: statusserver
    namespace: sensitivityscore-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: statusserver-bench-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: statusserver-node-reader
subjects:
  - kind: ServiceAccount
    name: statusserver
    namespace: sensitivityscore-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: statusserver-node-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
  labels: {app: statusserver}
spec:
  replicas: 1
  selector:
    matchLabels: {app: statusserver}
  template:
    metadata:
      labels: {app: statusserver}
    spec:
      serviceAccountName: statusserver
      nodeSelector:
        node-role.kubernetes.io/ss-system: ""
      tolerations:
        - key: node-role.kubernetes.io/ss-system
          operator: Exists
          effect: NoSchedule
      containers:
        - name: statusserver
          image: andreyza/statusserver:dev
          imagePullPolicy: Always
          args:
            - --log=/data/series.log
            - --config=/data/config.yaml
            - --results=/data/results.parquet
            - --baselines=/data/baselines.parquet
            - --report=/data/report
            - --scope=full
            - --stand=прод (in-cluster)
            - --port=8787
          ports:
            - {name: http, containerPort: 8787}
          env:
            # Дублирует ENV из statusserver/Dockerfile — намеренно: если образ
            # когда-нибудь пересоберут без этой строки, страница здесь начнёт
            # молча падать с SIGSEGV. Дефолтный memory pool Arrow роняет процесс
            # на pd.read_parquet из тред-обработчика (подробности — в Dockerfile).
            - {name: ARROW_DEFAULT_MEMORY_POOL, value: system}
          # Страница нужна во время многочасовой серии и не должна с неё
          # ничего отбирать: лимит держим маленьким и прибиваем к ss-system.
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "300m", memory: "512Mi"}
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          # Пробы бьют по /healthz, а НЕ по «/». «/» собирает весь снимок:
          # читает лог, оба parquet и делает до трёх вызовов kubectl — на
          # холодном кэше топологии это дольше дефолтного timeoutSeconds: 1,
          # и readinessProbe выводила исправный под из Endpoints, то есть сама
          # же и делала страницу недоступной. /healthz не читает ничего.
          readinessProbe:
            httpGet: {path: /healthz, port: 8787}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          # Живость: до этого её не было вовсе, и повисший процесс (страница
          # отвечает 200 на всё, но собрать снимок не может) остался бы в
          # Endpoints навсегда.
          livenessProbe:
            httpGet: {path: /healthz, port: 8787}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        # Тот же том, куда пишет in-cluster харнесс. readOnly не только в
        # volumeMounts, но и здесь: страницу держат открытой во время серии,
        # и возможности испортить прогон у неё быть не должно.
        - name: data
          persistentVolumeClaim:
            claimName: harness-results
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: statusserver
  namespace: sensitivityscore-bench
  labels: {app: statusserver}
spec:
  selector: {app: statusserver}
  ports:
    - {name: http, port: 8787, targetPort: 8787}
