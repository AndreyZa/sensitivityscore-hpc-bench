# slurmd (23.11) unconditionally initializes the cgroup plugin at startup —
# even with ProctrackType=proctrack/linuxproc and TaskPlugin=none — and in
# cgroup/v2 mode it defaults to creating a systemd scope for slurmstepd via
# dbus. There's no systemd/dbus in this plain container, so that init fails
# fatally ("cannot connect to dbus system daemon" -> "Unable to initialize
# cgroup plugin"). IgnoreSystemd=yes is the documented escape hatch: Slurm
# manages the cgroup hierarchy itself instead of delegating to systemd.
# (CgroupPlugin=disabled looks tempting but isn't a real plugin name in
# 23.11 — it fails with "cannot find cgroup plugin for disabled".)
IgnoreSystemd=yes
