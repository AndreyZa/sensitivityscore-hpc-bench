# Статус-страница прогона локально, в контейнере.
#
# Единственный поддерживаемый способ поднять страницу на своей машине.
# Обычно её поднимает сам лаунчер (scripts/run-series.sh -> `make series`),
# вручную это нужно только чтобы посмотреть на уже законченную серию.
#
#   SERIES=net-diff docker compose -f statusserver/docker-compose.yaml up -d --build
#   docker compose -f statusserver/docker-compose.yaml logs -f
#   docker compose -f statusserver/docker-compose.yaml down
#
# --build обязателен: без него compose поднимет РАНЕЕ собранный statusserver:local
# и правки страницы просто не попадут в контейнер.
#
# Переменные:
#   SERIES       какую серию показывать (без неё — дефолтные файлы, см. ниже)
#   STATUS_PORT  порт на хосте (по умолчанию 8787)
#   STAND        подпись стенда в шапке страницы
#   RESULTS/BASELINES  пути к parquet ОТНОСИТЕЛЬНО корня репозитория. Их
#                передаёт run-series.sh, который берёт имена из секции output
#                конфига серии — там единственный источник правды. Дефолты
#                ниже лишь воспроизводят обычное соглашение об именах.
#   KUBECONFIG   конфиг доступа к стенду; ДОЛЖЕН указывать на нужный кластер —
#                иначе секция кластера покажет чужой (например docker-desktop).
#
# Репозиторий монтируется read-only: страница только читает, и возможности
# испортить идущий прогон у неё быть не должно.
services:
  statusserver:
    # Тег локальный и собирается ЗДЕСЬ, под архитектуру машины. Образ для
    # кластера (make image-statusserver) собирается под linux/amd64 — на
    # Apple Silicon он идёт под эмуляцией, и это не теоретическая беда:
    # контейнер молча выходил и переставал отвечать на опубликованном порту.
    # Локально нужен нативный, в кластере — amd64; это разные образы.
    image: statusserver:local
    container_name: ss-status
    build:
      context: ..
      dockerfile: statusserver/Dockerfile
    ports:
      - "${STATUS_PORT:-8787}:8787"
    volumes:
      - ..:/repo:ro
      # kubeconfig — для секции кластера (statusserver/cluster.py). Если файла
      # нет, docker создаёт на его месте ПУСТУЮ ДИРЕКТОРИЮ (в том числе в
      # $HOME пользователя) и kubectl внутри падает; страница живёт дальше, но
      # секция кластера молча пустая — в cluster.py это best-effort.
      - ${KUBECONFIG:-${HOME}/.kube/config}:/kube/config:ro
    environment:
      KUBECONFIG: /kube/config
      # Часовой пояс хоста. Маркеры фаз харнесс пишет по локальному времени
      # ("=== BASELINE START 02:14:32 ==="), а контейнер по умолчанию живёт в
      # UTC — прогон, начатый в 02:14 MSK, выглядел стартовавшим 21 час назад
      # («идёт 21 ч 02 мин, осталось 21456 мин»). Новые логи несут epoch в
      # самом маркере и от TZ не зависят; эта переменная нужна для старых
      # логов и для того, чтобы время на странице совпадало с временем в
      # терминале оператора.
      TZ: ${TZ:-Europe/Moscow}
    command:
      - --log=/repo/harness/stage-${SERIES:-pressure}.log
      - --config=/repo/harness/config-stage${SERIES:+-${SERIES}}.yaml
      - --results=/repo/${RESULTS:-harness/results/results-stage${SERIES:+-${SERIES}}.parquet}
      - --baselines=/repo/${BASELINES:-harness/results/baselines-stage${SERIES:+-${SERIES}}.parquet}
      - --report=/repo/analysis/report-stage${SERIES:+-${SERIES}}
      - --scope=full
      - --stand=${STAND:-STAGE}
    # Страница переживает перезагрузку хоста и падение процесса. Гасить её
    # отдельно: `docker compose -f statusserver/docker-compose.yaml down` —
    # остановка серии (`make series-stop`) её НЕ трогает.
    restart: unless-stopped
    healthcheck:
      # /healthz, а не «/»: «/» собирает весь снимок (лог, оба parquet, до трёх
      # kubectl), и на холодном кэше топологии это дольше таймаута проверки —
      # исправная страница помечалась unhealthy. /healthz не читает ничего.
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8787/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
